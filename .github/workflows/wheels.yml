name: Build Wheels

on:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
    - name: Check out the repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Set up rust toolchain
      run: rustup toolchain install stable

    - name: Set up rust cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

    - name: Set up python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - name: install python dependencies
      run: pip install -U setuptools wheel twine maturin build

    - name: build sdist
      run: |
        python -m build --sdist -o wheelhouse

    - name: List and check sdist
      run: |
        ls -lh wheelhouse/
        twine check wheelhouse/*

    - name: Upload sdist
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: wheels-sdist
        path: ./wheelhouse/*.tar.gz

  build_wheels:
    name: >
      build ${{ matrix.platform || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, ubuntu-arm, windows, macos]
        include:
          - os: ubuntu
            platform: linux
            pip_cache: ~/.cache/pip
          - os: ubuntu-arm
            platform: linux-arm
            pip_cache: ~/.cache/pip
            runs_on: ubuntu-24.04-arm
          - os: windows
            ls: dir
            pip_cache: ~\AppData\Local\pip\Cache

    runs-on: ${{ matrix.runs_on || format('{0}-latest', matrix.os) }}
    steps:
    - name: Check out the repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Set up python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - if: matrix.os == 'macos' || matrix.os == 'windows'
      name: Set up rust toolchain
      run: rustup toolchain install stable

    - if: matrix.os == 'macos' || matrix.os == 'windows'
      name: Set up rust cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

    # Set up rust toolchain on mac os and windows (linux containers handled below)
    - if: matrix.os == 'macos'
      name: Add aarch64-apple-darwin target
      run: rustup target add aarch64-apple-darwin

    - if: matrix.os == 'windows'
      name: Add i686-pc-windows-msvc target
      run: |
        # Disable self-update on windows to prevent race condition; see https://github.com/rust-lang/rustup/issues/2441
        rustup toolchain install stable-i686-pc-windows-msvc --no-self-update
        rustup target add i686-pc-windows-msvc

    - name: Build ${{ matrix.platform || matrix.os }} binaries
      uses: pypa/cibuildwheel@ee02a1537ce3071a004a6b08c41e72f0fdc42d9a # v3.4.0
      env:
        CIBW_BUILD: 'cp*'
        # rust doesn't seem to be available for musl linux on i686
        CIBW_SKIP: '*-musllinux_i686 cp38* cp313* cp314*'
        # we build for matrix.arch (only exists on macos), else 'auto'
        CIBW_ARCHS: 'auto'
        CIBW_ENVIRONMENT: 'PATH="$HOME/.cargo/bin:$PATH" CARGO_TERM_COLOR="always"'
        CIBW_ENVIRONMENT_WINDOWS: 'PATH="$UserProfile\.cargo\bin;$PATH"'
        CIBW_BEFORE_BUILD: rustup show
        # Linux wheels are built in manylinux containers; set up rust toolchain here
        CIBW_BEFORE_BUILD_LINUX: >
          curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain=stable --profile=minimal -y &&
          rustup show
        CIBW_BUILD_VERBOSITY: 1

    - name: List and check wheels
      run: |
        pip install twine
        ${{ matrix.ls || 'ls -lh' }} wheelhouse/
        twine check wheelhouse/*

    - name: Upload wheels
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  upload_to_pypi:
    name: Upload to PYPI
    runs-on: ubuntu-latest
    if: (github.event_name == 'release' && startsWith(github.ref, 'refs/tags')) || (github.event_name == 'workflow_dispatch')
    needs: [build_wheels, build_sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/nbstripout-fast
    permissions:
      id-token: write
    steps:
      - name: Retrieve wheels and sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: wheels/

      - name: List the build artifacts
        run: |
          ls -lAs wheels/

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1.13
        with:
          packages_dir: wheels/
          verbose: true
